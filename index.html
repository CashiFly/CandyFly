<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CandyFlyGame — Вход работает</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #1a0a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-box, .game {
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 350px;
        }
        input, button {
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
            border: none;
            width: 80%;
        }
        button {
            background: #ff4d6d;
            color: white;
            cursor: pointer;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div id="authScreen">
    <div class="auth-box">
        <h2>🍬 CandyFlyGame</h2>
        <input type="text" id="username" placeholder="Никнейм">
        <input type="password" id="password" placeholder="Пароль">
        <button id="registerBtn">Регистрация</button>
        <button id="loginBtn">Вход</button>
        <div id="message" style="color: #ffaa88;"></div>
    </div>
</div>
<div id="gameScreen" class="game hidden">
    <h2>Добро пожаловать, <span id="userName"></span>!</h2>
    <p>🍬 Очки: <span id="score">0</span></p>
    <p>🪙 Флай-коины: <span id="coins">0</span></p>
    <button id="clickBtn">🍬 Клик!</button>
    <button id="logoutBtn">Выйти</button>
</div>

<script>
    // ========== ТВОИ КЛЮЧИ SUPABASE ==========
    const SUPABASE_URL = "https://hpjhdvscofevsjcslify.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwamhkdnNjb2ZldnNqY3NsaWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzQ3MDMsImV4cCI6MjA5MTA1MDcwM30.CqrN2uLYBfUoqJIMC4xP9TA4JRKmvCFa6tl1aOWkZGA";
    // =========================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    async function hashPassword(pass) {
        const encoder = new TextEncoder();
        const data = encoder.encode(pass);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    document.getElementById('registerBtn').onclick = async () => {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!username || !password) {
            document.getElementById('message').innerText = 'Заполни все поля';
            return;
        }
        const hash = await hashPassword(password);
        const { error } = await supabase.from('users').insert([{ username, password_hash: hash, score: 0, fly_coins: 0 }]);
        if (error) {
            document.getElementById('message').innerText = 'Ошибка: ' + error.message;
        } else {
            document.getElementById('message').innerText = '✅ Аккаунт создан! Теперь войдите.';
        }
    };

    document.getElementById('loginBtn').onclick = async () => {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!username || !password) {
            document.getElementById('message').innerText = 'Введи данные';
            return;
        }
        const hash = await hashPassword(password);
        const { data, error } = await supabase.from('users').select('*').eq('username', username).eq('password_hash', hash).single();
        if (error || !data) {
            document.getElementById('message').innerText = 'Неверный логин или пароль';
            return;
        }
        currentUser = data;
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        document.getElementById('userName').innerText = currentUser.username;
        document.getElementById('score').innerText = currentUser.score;
        document.getElementById('coins').innerText = currentUser.fly_coins;
    };

    document.getElementById('clickBtn').onclick = async () => {
        if (!currentUser) return;
        const newScore = currentUser.score + 1;
        const newCoins = Math.floor(newScore / 10);
        const { error } = await supabase.from('users').update({ score: newScore, fly_coins: newCoins }).eq('id', currentUser.id);
        if (!error) {
            currentUser.score = newScore;
            currentUser.fly_coins = newCoins;
            document.getElementById('score').innerText = newScore;
            document.getElementById('coins').innerText = newCoins;
        }
    };

    document.getElementById('logoutBtn').onclick = () => {
        currentUser = null;
        document.getElementById('authScreen').classList.remove('hidden');
        document.getElementById('gameScreen').classList.add('hidden');
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('message').innerText = '';
    };
</script>
</body>
</html>
